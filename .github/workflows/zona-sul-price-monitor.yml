name: velho sábado do mercado

on:
  workflow_dispatch:
  schedule:
    # America/Sao_Paulo strategic times:
    # 02:30, 04:30, 06:30, 09:30, 12:30, 15:30, 18:30, 22:30
    # GitHub cron uses UTC.
    - cron: "30 1,5,7,9,12,15,18,21 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Zona Sul price monitor
        run: node scripts/monitor-zonasul-prices.mjs

      - name: Commit monitor data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/price-monitor/observations.jsonl data/price-monitor/summary.json
          if git diff --cached --quiet; then
            echo "No monitor changes to commit."
          else
            git commit -m "Update Zona Sul price monitor"
            git push
          fi

      - name: Prepare dashboard
        run: |
          rm -rf _site
          mkdir -p _site/data/price-monitor
          cp -R dashboard/. _site/
          cp data/price-monitor/summary.json _site/data/price-monitor/summary.json
          cp data/price-monitor/observations.jsonl _site/data/price-monitor/observations.jsonl

      - name: Check GitHub Pages support
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set +e
          api="https://api.github.com/repos/${GH_REPOSITORY}/pages"
          headers=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          status=$(curl -L -sS -o pages.json -w "%{http_code}" "${headers[@]}" "$api")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          create_status=$(curl -L -sS -o pages-create.json -w "%{http_code}" -X POST "${headers[@]}" "$api" -d '{"build_type":"workflow"}')
          if [ "$create_status" = "200" ] || [ "$create_status" = "201" ] || [ "$create_status" = "204" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            cat pages-create.json
          fi

      - name: Configure GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy dashboard
        if: steps.pages.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
